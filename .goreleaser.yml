version: 2

before:
  hooks:
    - go mod tidy
    - go generate ./...

builds:
  - env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X main.version={{.Version}}
      - -X main.commit={{.ShortCommit}}
      - -X main.date={{.Date}}
    binary: llmc

archives:
  - format: tar.gz
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        format: zip

nfpms:
  - id: packages
    package_name: llmc
    vendor: LLM Conveyors
    homepage: https://llmconveyors.com
    maintainer: LLM Conveyors <support@llmconveyors.com>
    description: Official CLI for the LLM Conveyors AI Agent Platform
    license: MIT
    formats:
      - deb
      - rpm
    bindir: /usr/bin

brews:
  - repository:
      owner: llmconveyors
      name: homebrew-tap
    name: llmc
    homepage: https://llmconveyors.com
    description: Official CLI for the LLM Conveyors AI Agent Platform
    license: MIT
    install: |
      bin.install "llmc"

checksum:
  name_template: "checksums.txt"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
